<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var t = localStorage.getItem("fasttodo:theme") || "dark";
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastTodo</title>
  <link rel="icon" href="/icon.png" type="image/png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">FastTodo</h1>
      <div class="header-controls">
        <div class="theme-picker" id="theme-picker">
          <button
            type="button"
            class="theme-picker-btn"
            id="theme-picker-btn"
            aria-label="Тема"
            aria-haspopup="listbox"
            aria-expanded="false"
          ></button>
          <ul class="theme-picker-menu" id="theme-picker-menu" role="listbox" aria-label="Тема" hidden></ul>
        </div>
        <nav class="view-switch">
          <button class="view-btn active" data-view="current">Текущая</button>
          <button class="view-btn" data-view="all">Все задачи</button>
        </nav>
      </div>
    </header>

    <main id="main">
      <!-- Current task view -->
      <section id="view-current" class="view active">
        <div id="no-task" class="empty-state hidden">
          <p>Нет выбранной задачи</p>
          <p class="hint">Создайте задачу или выберите из списка «Все задачи»</p>
        </div>

        <div id="task-detail" class="hidden">
          <div class="task-sticky-header">
            <nav id="task-nav" class="task-nav hidden" aria-label="Переключение задач">
              <button type="button" id="btn-prev-task" class="task-nav-btn task-nav-prev">
                <span class="task-nav-arrow">‹</span>
                <span id="task-nav-prev-title" class="task-nav-label"></span>
              </button>
              <button type="button" id="btn-next-task" class="task-nav-btn task-nav-next">
                <span id="task-nav-next-title" class="task-nav-label"></span>
                <span class="task-nav-arrow">›</span>
              </button>
            </nav>

            <div class="task-header">
              <div class="task-title-wrap">
                <h2 id="task-title"></h2>
                <input type="text" id="task-title-input" class="task-title-input hidden" maxlength="200" aria-label="Название задачи">
              </div>
              <div class="task-header-actions">
                <button type="button" id="btn-edit-task" class="btn-icon btn-icon-edit" title="Редактировать">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                  </svg>
                </button>
                <button type="button" id="btn-delete-task" class="btn-icon btn-icon-danger" title="Удалить задачу">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/>
                    <path d="M10 11v6M14 11v6"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="progress-block">
              <div class="progress-meta">
                <span id="progress-label">0 из 0</span>
                <span id="progress-percent" class="progress-percent">0%</span>
              </div>
              <div class="progress-track">
                <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
              </div>
            </div>
          </div>

          <ul id="items-list" class="items-list"></ul>

          <form id="form-add-item" class="add-form">
            <input type="text" id="item-name" placeholder="Пункт вне секций (или оставьте пустым)">
            <button type="submit" class="btn-primary">+ Пункт</button>
          </form>
        </div>
      </section>

      <!-- All tasks view -->
      <section id="view-all" class="view">
        <form id="form-new-task" class="new-task-form">
          <input type="text" id="task-name" placeholder="Новая задача..." required>
          <button type="submit" class="btn-primary">Создать</button>
        </form>

        <ul id="tasks-list" class="tasks-list"></ul>
        <div id="all-empty" class="empty-state hidden">
          <p>Задач пока нет</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
